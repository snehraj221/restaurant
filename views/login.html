<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Royal Indian Rasoi</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .login-card { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 6px solid #800000; text-align: center; }
        .login-card h2 { color: #800000; margin-bottom: 2rem; }
        .auth-logo { width: 70px; margin-bottom: 1rem; }
    </style>
</head>
<body class="auth-bg">

    <div class="login-card">
        <img src="https://cdn-icons-png.flaticon.com/512/3443/3443338.png" alt="Cook Icon" class="auth-logo">
        <h2>Admin & Member Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Username or Email</label>
                <input type="text" id="username" placeholder="Enter your credentials" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="submit-btn">Login to Kitchen</button>
        </form>
        <div id="loginMsg" class="result-msg"></div>
        <div style="margin-top: 20px;">
            <p style="font-size: 0.9rem;">Don't have an account? <a href="/signup" style="color: #800000; font-weight: bold;">Signup here</a></p>
        </div>
    </div>

    <script src="admin_script.js"></script>
</body>
</html>
