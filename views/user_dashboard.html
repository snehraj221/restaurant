<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Royal Indian Rasoi</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        .dashboard-hero { background: linear-gradient(rgba(128, 0, 0, 0.9), rgba(128, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80'); padding: 4rem 10%; color: white; text-align: center; }
        .dashboard-hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: #FFD700; margin-bottom: 0.5rem; }
        .tab-container { max-width: 900px; margin: -50px auto 4rem auto; background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; z-index: 10; }
        .tabs { display: flex; gap: 20px; margin-bottom: 2rem; border-bottom: 2px solid #eee; }
        .tab { padding: 10px 20px; cursor: pointer; font-weight: 600; color: #666; transition: 0.3s; }
        .tab.active { color: #800000; border-bottom: 3px solid #800000; }
        .card { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; border-bottom: 1px solid #eee; }
        .card:last-child { border-bottom: none; }
        .status-badge { padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; background: #e6f4ea; color: #1e7e34; }
        .order-items { font-size: 0.85rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Rasoi Buddy</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/#menu">Menu</a></li>
            <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
    </nav>

    <div class="dashboard-hero">
        <h1>Welcome, <span id="userName">Guest</span>!</h1>
        <p>Your Royal Dining & Ordering Dashboard</p>
        
        <div style="display: flex; justify-content: center; gap: 30px; margin-top: 2rem;">
            <div style="background: rgba(255,255,255,0.1); padding: 1rem 2rem; border-radius: 12px; backdrop-filter: blur(5px);">
                <h3 style="color: #FFD700; margin: 0;" id="statVisits">0</h3>
                <p style="margin: 0; font-size: 0.8rem; text-transform: uppercase;">Total Visits</p>
            </div>
            <div style="background: rgba(255,255,255,0.1); padding: 1rem 2rem; border-radius: 12px; backdrop-filter: blur(5px);">
                <h3 style="color: #FFD700; margin: 0;" id="statSpent">₹0</h3>
                <p style="margin: 0; font-size: 0.8rem; text-transform: uppercase;">Total Spent</p>
            </div>
        </div>
    </div>

    <div class="tab-container">
        <div class="tabs">
            <div class="tab active" data-tab="bookings">Table Bookings</div>
            <div class="tab" data-tab="orders">Food Orders</div>
            <div class="tab" data-tab="profile">My Profile</div>
        </div>

        <!-- Bookings Section -->
        <div id="bookings-section">
            <div id="bookingList"><p>Loading bookings...</p></div>
        </div>

        <!-- Orders Section -->
        <div id="orders-section" style="display: none;">
            <div id="orderList"><p>Loading orders...</p></div>
        </div>

        <!-- Profile Section -->
        <div id="profile-section" style="display: none;">
            <div class="form-card" style="box-shadow: none; border-top: none;">
                <form id="profileForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="profileName" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="profileEmail" readonly style="background: #f5f5f5; cursor: not-allowed;">
                    </div>
                    <button type="submit" class="submit-btn" style="background-color: #800000;">Update Profile</button>
                </form>
            </div>
        </div>
        
        <div style="margin-top: 2rem; text-align: center;">
            <a href="/" class="submit-btn" style="display: inline-block; width: auto; padding: 12px 30px; text-decoration: none;">New Booking / Order</a>
        </div>
    </div>

    <!-- Edit Booking Modal -->
    <div id="editModal" class="modal" style="display:none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
        <div style="background: white; padding: 2.5rem; border-radius: 15px; width: 100%; max-width: 400px;">
            <h2 style="color: #800000; margin-bottom: 1.5rem;">Edit Timing</h2>
            <form id="editBookingForm">
                <input type="hidden" id="editBookingId">
                <div class="form-group">
                    <label>New Date</label>
                    <input type="date" id="editDate" required>
                </div>
                <div class="form-group">
                    <label>New Time</label>
                    <input type="time" id="editTime" required>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 2rem;">
                    <button type="submit" class="submit-btn" style="background-color: #FF8C00;">Save Changes</button>
                    <button type="button" onclick="closeEditModal()" class="submit-btn" style="background-color: #666;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Royal Indian Rasoi. All Rights Reserved.</p>
    </footer>

    <script src="user_dashboard.js"></script>
</body>
</html>
